<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duggu's Magical Journey</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0c0f2c;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
}

/* Stars background */

.stars{
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.4;
animation:moveStars 60s linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0)}
to{transform:translateY(-200px)}
}

/* Main card */

.container{
max-width:700px;
background:rgba(255,255,255,0.95);
color:black;
padding:40px;
border-radius:25px;
box-shadow:0 25px 70px rgba(0,0,0,0.4);
text-align:center;
z-index:2;
}

h1{
color:#ff4d9a;
}

p{
font-size:19px;
line-height:1.6;
min-height:90px;
}

/* Buttons */

button{
padding:12px 28px;
border:none;
border-radius:30px;
background:#ff4d9a;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
transition:0.25s;
}

button:hover{
transform:scale(1.1);
}

#noBtn{
position:relative;
}

/* Floating hearts */

.spark{
position:absolute;
font-size:22px;
animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-700px);opacity:0}
}

/* Intro screen */

#intro{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#0c0f2c;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:5;
}

.castle{
font-size:60px;
margin-bottom:20px;
}

/* Music button */

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4d9a;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
z-index:10;
}

</style>
</head>

<body>

<div class="stars"></div>

<!-- Intro Screen -->

<div id="intro">

<div class="castle">🏰</div>

<h2>Welcome Akshuu ✨</h2>

<p>A tiny magical world is waiting for you...</p>

<button onclick="startJourney()">Open The Gates</button>

</div>

<!-- Main Card -->

<div class="container" style="display:none">

<h1 id="title">Akshuu ✨</h1>

<p id="text"></p>

<button id="nextBtn" onclick="nextScene()">Next</button>

<div id="choices" style="display:none">
<button onclick="yesClicked()">Yes 💖</button>
<button id="noBtn" onmouseover="moveButton()">Let me think 🤭</button>
</div>

</div>

<button id="musicBtn" onclick="toggleMusic()">🔊 Music</button>

<!-- Music -->

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_8c4e0b41d5.mp3" type="audio/mpeg">
</audio>

<script>

/* Start Journey */

function startJourney(){

document.getElementById("intro").style.display="none";
document.querySelector(".container").style.display="block";

const music=document.getElementById("music");
music.volume=0.4;
music.play().catch(()=>{});

nextScene();

}

/* Story Scenes */

let scene=0;

const scenes=[

"Before this little journey ends… Duggu wants to ask you something.",

"Do you ever think about him when you're sad or alone?",

"When something really good happens… do you ever want to tell him first?",

"Are you scared that saying what you feel might ruin the friendship?",

"Because feelings are confusing… and hearts are stubborn.",

"Akshuu… it took a lot of courage for me to say this.",

"I wasn't ready yet… but I felt I might regret it if I stayed silent.",

"You are not just a friend to me.",

"You are way more than that.",

"I really like you… but I am scared of losing you.",

"So I just want to ask honestly."

];

/* Typewriter effect */

function typeWriter(text){

let i=0;
let speed=35;
let output="";

let textArea=document.getElementById("text");

textArea.innerHTML="";

function typing(){

if(i<text.length){

output+=text.charAt(i);
textArea.innerHTML=output;
i++;
setTimeout(typing,speed);

}

}

typing();

}

/* Next Scene */

function nextScene(){

if(scene<scenes.length){

typeWriter(scenes[scene]);
scene++;

}

else{

document.getElementById("title").innerText="Final Question 💌";

typeWriter("Akshuu… will you allow Duggu to call you his permanent person?");

document.getElementById("nextBtn").style.display="none";

document.getElementById("choices").style.display="block";

}

}

/* Escaping No button */

function moveButton(){

let btn=document.getElementById("noBtn");

let x=Math.random()*350-150;
let y=Math.random()*200-100;

btn.style.transform=`translate(${x}px,${y}px)`;

btn.innerText=["Nice try 😜","No escape 👀","Destiny says yes 😏"][Math.floor(Math.random()*3)];

}

/* Yes celebration */

function yesClicked(){

document.querySelector(".container").innerHTML=

"<h1>💖 YOU JUST MADE DUGGU THE HAPPIEST HUMAN 💖</h1>"+

"<p>This is the beginning of our little fairytale ✨</p>";

launchHearts();

}

/* Heart explosion */

function launchHearts(){

for(let i=0;i<70;i++){

let spark=document.createElement("div");

spark.className="spark";

spark.innerText="💖";

spark.style.left=Math.random()*100+"%";

spark.style.bottom="0px";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),5000);

}

}

/* Music toggle */

function toggleMusic(){

const music=document.getElementById("music");

if(music.paused){

music.play();
document.getElementById("musicBtn").innerText="🔊 Music";

}

else{

music.pause();
document.getElementById("musicBtn").innerText="🔇 Music";

}

}

</script>

</body>
</html>
