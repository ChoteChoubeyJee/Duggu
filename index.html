<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Duggu ❤️ Akshuu</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(#ffd6e7,#ffc2dc);
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
}

.star{
position:absolute;
background:#c2185b;
border-radius:50%;
animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* CARD */

.container{
background:white;
max-width:700px;
padding:45px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,.15);
text-align:center;
z-index:2;
}

h1{
font-family:"Great Vibes",cursive;
font-size:42px;
color:#c2185b;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.7;
color:#444;
min-height:120px;
}

/* BUTTONS */

button{
padding:12px 26px;
border:none;
border-radius:30px;
background:#c2185b;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* HEART BALLOONS */

.heart{
position:absolute;
font-size:24px;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-100vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<h1>For Akshuu</h1>

<p id="text"></p>

<button id="nextBtn" onclick="nextScene()">Next</button>

<div id="choices" style="display:none">
<button onclick="yesClicked()">Yes 💖</button>
<button onclick="noClicked()">No</button>
</div>

</div>

<audio id="bgMusic" loop>
<source src="Background.mp3" type="audio/mpeg">
</audio>

<script>

/* CREATE RANDOM STARS */

const starContainer=document.getElementById("stars");

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

let size=Math.random()*4+1;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.top=Math.random()*100+"%";
star.style.left=Math.random()*100+"%";

star.style.animationDelay=Math.random()*5+"s";

starContainer.appendChild(star);

}

/* MUSIC */

let musicStarted=false;
const music=document.getElementById("bgMusic");

/* STORY */

let scene=0;

const scenes=[

"Goooood mooooorrnniiinnnggg Akshuuuuu!! ☀️",

"I know this is little random, weird… jo bhi tum kaho.",

"But idk why I just cannot stop thinking about telling you this.",

"Especially kal ke uss shaadi wale topic ke baad.",

"Yes… I want to see you getting married.",

"But not with anybody else 🥺",

"I get this very strong urge to take care of you… hameshaa ke liye.",

"Subah so ke uthu toh tumhe dekh paau.",

"Phir tum mujhse chai ya coffee maango… jo bhi tumhe pasand ho.",

"Phir thodi baatein karo mujhse.",

"You make me feel like somebody was actually waiting for me.",

"Maybe I am feeling too much… but this is what I am feeling.",

"Haan, agar tum kuch aur feel karti ho toh upset mat hona.",

"Mujhe bas sach bata dena.",

"Akshuu… you've been closest to me in some very heavy moments.",

"And I really love you for this.",

"You handled me so well. Thank you so much for everything.",

"I don't want to lose you as a friend.",

"But I cannot hold all this in me anymore.",

"So I just want to ask you one honest thing.",

"Do you also feel something like this for me?"

];

/* TYPEWRITER */

function typeWriter(text){

let i=0;
let area=document.getElementById("text");

area.innerHTML="";

function typing(){

if(i<text.length){

area.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,35);

}

}

typing();

}

/* NEXT */

function nextScene(){

if(!musicStarted){

music.volume=.35;
music.play();
musicStarted=true;

}

if(scene<scenes.length){

typeWriter(scenes[scene]);
scene++;

}

else{

document.getElementById("nextBtn").style.display="none";
document.getElementById("choices").style.display="block";

}

}

/* YES */

function yesClicked(){

document.querySelector(".container").innerHTML=

"<h1>Whatt!! Sach me! 🥹</h1>" +
"<p>I can't believe you also feel the same ❤️</p>" +
"<p>Call karo mujhe please 😭😭</p>";

startHeartRain();

}

/* HEART BALLOONS FOREVER */

function startHeartRain(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerText="💖";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="-20px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},300);

}

/* NO */

function noClicked(){

document.querySelector(".container").innerHTML=

"<h1>Thank you for being honest ❤️</h1><p>No matter what, I am grateful to have you in my life.</p>";

}

</script>

</body>
</html>
