<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duggu's Magical Journey</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:radial-gradient(circle at bottom,#020111 0%,#000814 100%);
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* STAR FIELD */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:0;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* QUESTION CARD */

.container{
position:relative;
z-index:2;
max-width:650px;
background:rgba(255,255,255,.95);
color:#111;
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
text-align:center;
}

h1{
color:#ff3f8e;
}

p{
font-size:18px;
line-height:1.6;
min-height:90px;
}

/* BUTTONS */

button{
padding:12px 26px;
border:none;
border-radius:30px;
background:#ff3f8e;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#noBtn{
position:relative;
}

/* HEARTS */

.heart{
position:absolute;
font-size:24px;
animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-600px);opacity:0}
}

/* INTRO */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:3;
text-align:center;
}

.castle{
font-size:60px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div id="intro">

<div class="castle">🏰</div>

<h2>Welcome Akshuu ✨</h2>

<p>I made something small for you.</p>

<button onclick="startJourney()">Open The Gates</button>

</div>

<div class="container" style="display:none">

<h1 id="title">Akshuu</h1>

<p id="text"></p>

<button id="nextBtn" onclick="nextScene()">Next</button>

<div id="choices" style="display:none">
<button onclick="yesClicked()">Yes 💖</button>
<button id="noBtn" onmouseover="moveButton()">Let me think 🤭</button>
</div>

</div>

<audio id="bgMusic" loop>
<source src="Background.mp3" type="audio/mpeg">
</audio>

<script>

/* CREATE RANDOM STARS */

const starContainer=document.getElementById("stars");

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

let size=Math.random()*3+1;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.top=Math.random()*100+"%";
star.style.left=Math.random()*100+"%";

star.style.animationDelay=Math.random()*5+"s";

starContainer.appendChild(star);

}

/* MUSIC */

const bgMusic=document.getElementById("bgMusic");

/* START */

function startJourney(){

document.getElementById("intro").style.display="none";

document.querySelector(".container").style.display="block";

bgMusic.volume=.35;
bgMusic.play().catch(()=>{});

nextScene();

}

/* STORY */

let scene=0;

const scenes=[

"Akshuu… tell me honestly. Do you ever think about me when you're feeling sad or a little alone?",

"When something really good happens… do you ever feel like telling me first?",

"And sometimes… are you scared that if you say what you truly feel, it might change the friendship we already have?",

"Because honestly… I feel that fear too.",

"Feelings can be confusing, and our friendship is something I truly value.",

"I don't know if it is too soon, or maybe I've already delayed saying this… but sometimes I feel like you are more than just a friend to me.",

"And honestly, I would love to have you as more than just a friend.",

"But before anything else, it is very important for me to know what you feel.",

"Do you also feel the same for me… or is it just me?"

];

/* TYPEWRITER */

function typeWriter(text){

let i=0;

let area=document.getElementById("text");

area.innerHTML="";

function type(){

if(i<text.length){

area.innerHTML+=text.charAt(i);

i++;

setTimeout(type,35);

}

}

type();

}

/* NEXT */

function nextScene(){

if(scene<scenes.length){

typeWriter(scenes[scene]);

scene++;

}

else{

document.getElementById("title").innerText="Final Question";

typeWriter("Akshuu… would you like to be more than just friends with me?");

document.getElementById("nextBtn").style.display="none";

document.getElementById("choices").style.display="block";

}

}

/* ESCAPING BUTTON */

function moveButton(){

let btn=document.getElementById("noBtn");

let x=Math.random()*300-150;

let y=Math.random()*200-100;

btn.style.transform=`translate(${x}px,${y}px)`;

}

/* YES CLICK */

function yesClicked(){

document.querySelector(".container").innerHTML=

"<h1>💖 You just made Duggu the happiest human 💖</h1><p>Maybe this is where our little story begins ✨</p>";

for(let i=0;i<70;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerText="💖";

heart.style.left=Math.random()*100+"%";

heart.style.bottom="0px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

}

}

</script>

</body>
</html>
