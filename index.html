
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Magical Tour for Akshuu</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ff9ecf,#ffd6f0,#ffe6f7);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.stars{
position:absolute;
width:100%;
height:100%;
background-image: radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.3;
animation: twinkle 6s infinite linear;
}

@keyframes twinkle{
from{transform:translateY(0)}
to{transform:translateY(-40px)}
}

.container{
max-width:600px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
text-align:center;
z-index:2;
}

h1{
color:#ff4d9a;
margin-bottom:10px;
}

p{
font-size:18px;
line-height:1.6;
}

button{
padding:12px 26px;
border:none;
border-radius:30px;
background:#ff4d9a;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
transition:0.25s;
}

button:hover{
transform:scale(1.1);
}

#noBtn{
position:relative;
}

.hearts{
position:absolute;
font-size:20px;
animation: floatUp 4s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-600px);opacity:0}
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

<h1 id="title">Welcome Akshuu ✨</h1>

<p id="text">
A tiny magical kingdom has been waiting for you. A princess guide wants to show you something special today.
</p>

<button id="nextBtn" onclick="nextScene()">Start the Magical Tour</button>

<div id="choices" style="display:none">
<button onclick="yesClicked()">Yes 💖</button>
<button id="noBtn" onmouseover="moveButton()">Let me think 🤭</button>
</div>

</div>

<script>

let scene=0;

function nextScene(){

scene++;

if(scene==1){
title.innerText="The Castle Garden 🌸";
text.innerText="Every fairy tale begins with someone kind… someone who secretly cares a lot.";
}

else if(scene==2){
title.innerText="The Magic River ✨";
text.innerText="Sometimes that person hopes you will notice how special you are to them.";
}

else if(scene==3){
title.innerText="The Star Bridge 🌙";
text.innerText="And sometimes… that person is a slightly silly guy named Duggu who made this tiny magical website just for you.";
}

else if(scene==4){
title.innerText="Final Question 💌";
text.innerText="So Akshuu… after this magical journey, there is only one important question.";
nextBtn.style.display="none";
choices.style.display="block";
}

}

function yesClicked(){

document.querySelector(".container").innerHTML=
"<h1>YAYYY AKSHUU 💖</h1>"+
"<p>You just made Duggu the happiest human alive 😭✨</p>"+
"<p>This fairytale officially begins now.</p>";

launchHearts();
}

function moveButton(){

let btn=document.getElementById("noBtn");

let x=Math.random()*300-150;
let y=Math.random()*200-100;

btn.style.transform=`translate(${x}px,${y}px)`;

}

function launchHearts(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="hearts";
heart.innerText="💖";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="0px";
heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

}

}

</script>

</body>
</html>
